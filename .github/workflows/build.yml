name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 💡 [핵심 해결책] 호환성이 가장 완벽한 파이썬 3.11 버전으로 강제 고정!
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 1. 코랩과 동일한 최신 엔진 및 부품 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev python3-pip openjdk-17-jdk zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake
          pip install --user --upgrade buildozer cython==0.29.33 virtualenv

      - name: 2. 안드로이드 APK 압축 (자동 약관 동의 적용)
        run: |
          export PATH=$PATH:~/.local/bin
          yes | buildozer android debug

      - name: 3. 완성된 APK 파일 배달
        uses: actions/upload-artifact@v4
        with:
          name: Master-App-APK
          path: bin/*.apk
